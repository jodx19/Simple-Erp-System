<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fb923c;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="100" height="100" rx="20" ry="20" fill="url(#bgGradient)"/>
  
  <!-- Border -->
  <rect x="2" y="2" width="96" height="96" rx="18" ry="18" fill="none" stroke="rgba(249,115,22,0.3)" stroke-width="2"/>
  
  <!-- Dashboard/Chart Icon -->
  <g transform="translate(20, 20)" filter="url(#glow)">
    <!-- Bar 1 -->
    <rect x="5" y="35" width="12" height="25" rx="3" fill="url(#iconGradient)"/>
    <!-- Bar 2 -->
    <rect x="22" y="20" width="12" height="40" rx="3" fill="url(#iconGradient)"/>
    <!-- Bar 3 -->
    <rect x="39" y="10" width="12" height="50" rx="3" fill="url(#iconGradient)"/>
    <!-- Line chart overlay -->
    <polyline points="11,30 28,18 45,8" fill="none" stroke="#14b8a6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Data points -->
    <circle cx="11" cy="30" r="3" fill="#14b8a6"/>
    <circle cx="28" cy="18" r="3" fill="#14b8a6"/>
    <circle cx="45" cy="8" r="3" fill="#14b8a6"/>
  </g>
  
  <!-- Small decorative elements -->
  <circle cx="85" cy="15" r="4" fill="#6366f1" opacity="0.8"/>
  <circle cx="15" cy="85" r="3" fill="#14b8a6" opacity="0.6"/>
</svg>
